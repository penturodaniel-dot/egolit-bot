<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egolist — Вхід</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f7;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
  }
  .logo {
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
    color: #1d1d1f;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #86868b;
    margin-bottom: 32px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #3a3a3c;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #d2d2d7;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 16px;
  }
  input:focus { border-color: #007aff; }
  button {
    width: 100%;
    padding: 13px;
    background: #1d1d1f;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background .2s;
  }
  button:hover { background: #3a3a3c; }
  .error {
    background: #fff1f0;
    color: #ff3b30;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Egolist</div>
  <div class="subtitle">Панель управління</div>

  {% if error %}
  <div class="error">Невірний логін або пароль</div>
  {% endif %}

  <form method="post" action="/login">
    <label>Логін</label>
    <input type="text" name="username" placeholder="admin" autofocus required>

    <label>Пароль</label>
    <input type="password" name="password" placeholder="••••••••" required>

    <button type="submit">Увійти</button>
  </form>
</div>
</body>
</html>
